<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubble</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <header>
        <img src="hubble.png"/>
        <h2 class="fonte" >hubble</h2>
    </header>

    <div class="login">
        <h1>Cadastro</h1>

        <input type="text" class="caixa-texto" id="nome" placeholder="Digite seu nome completo"/>
        <input type="date" class="caixa-texto" id="nascimento" placeholder="Data de nascimento"/>
        <input type="text" class="caixa-texto" id="email" placeholder="Digite seu email"/>
        <input type="text" class="caixa-texto" id="senha" placeholder="Crie uma senha"/>

        <button id="btnCadastrar">Criar conta</button>

        <h4 class="cadastro-texto">
            Já possui uma conta? 
            <a href="login.html" class="cadastro-link">Faça login</a>
        </h4>
    </div>
</body>

<script>
    document.getElementById("btnCadastrar").addEventListener("click", function () {

        const nome = document.getElementById("nome").value;
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;
        const nascimento = document.getElementById("nascimento").value;

        if ( !nome || !email || !senha || !nascimento){
            alert("Preecha todos os campos!");
            return;
        }

        const usuario = {
            nome: nome,
            email: email,
            senha: senha,
            nascimento: nascimento
        };

        localStorage.setItem("usuario", JSON.stringify(usuario));

        alert("Cadastro realizado com sucesso!");
        window.location.href = "login.html";

    });
</script>
</html>
