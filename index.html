<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubble</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:ital,wght@0,100..900;1,100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="hubble.png"/>
        <h2 class="fonte" >hubble</h2>
        
    </header>

    <!-- Tela de login (inicio) -->
    <div class="login">
        <h1>Login</h1>

        <input type="text" class="caixa-texto" id="loginEmail" placeholder="Digite seu email"/>
        <input type="text" class="caixa-texto" id="loginSenha" placeholder="Digite sua senha"/>

        <button id="btnLogin">Entrar</button>

        <h4 class="cadastro-texto">
            Não possui uma conta? 
            <a href="cad.html" class="cadastro-link">Cadastre-se</a>
        </h4>
    </div>

</body>

<script>
    document.getElementById("btnLogin").addEventListener("click", function () {

        const email = document.getElementById("loginEmail").value;
        const senha = document.getElementById("loginSenha").value;

        const usuarioSalvo = JSON.parse(localStorage.getItem("usuario"));

        if (!usuarioSalvo) {
            alert("Nenhum usuario encontrado");
            return;
        }

        if (email === usuarioSalvo.email && senha === usuarioSalvo.senha) {
            alert("Login realizado com sucesso! Bem vindo!")
        } else {
            alert("Email ou senha incorretos! Tente novamente")
        }
    });


</script>
</html>
